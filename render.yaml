services:
  - type: web
    name: cryptoquant-api
    runtime: python
    region: ohio
    plan: free
    pythonVersion: "3.11.11"
    buildCommand: "pip install --upgrade pip && pip install -r services/api/requirements.txt"
    startCommand: "uvicorn services.api.main:app --host 0.0.0.0 --port $PORT --workers 1"
    envVars:
      - key: PYTHONPATH
        value: .
      - key: USE_S3
        value: "true"
      - key: USE_POSTGRES
        value: "true"
      - key: USE_REDIS
        value: "false"
      - key: PREWARM_MODELS
        value: "false"
      - key: MODEL_CACHE_SIZE
        value: "1"
      - key: DEBUG
        value: "false"
      - key: ALLOW_MOCK_DATA
        value: "false"
      - key: EXCHANGE_TIMEOUT_MS
        value: "3000"
      - key: ENABLE_LIVE_INFERENCE
        value: "false"
      - key: CORS_ORIGINS
        value: "https://cryptoquant.vercel.app"
      - key: ONCHAIN_PROVIDER
        value: "free"
      - key: ONCHAIN_CACHE_TTL
        value: "3600"
      - key: DB_URL
        sync: false        # set via Render dashboard
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
