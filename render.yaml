services:
  - type: web
    name: cryptoquant-api
    runtime: python
    region: ohio
    plan: starter
    pythonVersion: "3.11.11"
    buildCommand: "pip install --upgrade pip && pip install -r services/api/requirements.txt"
    startCommand: "uvicorn services.api.main:app --host 0.0.0.0 --port $PORT --workers 1"
    envVars:
      - key: PYTHONPATH
        value: .
      - key: USE_S3
        value: "true"
      - key: USE_POSTGRES
        value: "true"
      - key: USE_REDIS
        value: "true"      # set to "false" to disable Redis
      - key: DEBUG
        value: "false"
      - key: DB_URL
        sync: false        # set via Render dashboard
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false

  - type: static
    name: cryptoquant-ui
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://cryptoquant-api-plez.onrender.com # Update this to your actual API URL if different
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
